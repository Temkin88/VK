  script:
    - 'curl "$ALLURE_ENDPOINT/api/uaa/account/me" -H "Authorization: Api-Token $ALLURE_TOKEN" -v'
    - python3.14 -m pytest --help | egrep sandbox || echo "Failed to run pytest"
    - ls -l
    - ./allurectl watch -- python3.14 -m pytest -m WS_INTEGRATION --sandbox https://auth-test.vkteams.vkwm.ru --alluredir=${ALLURE_RESULTS}
  rules:
#    - if: '$RUN_WS_JOB == "ws_integration"'
#      when: on_success
