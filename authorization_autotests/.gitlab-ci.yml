    ALLURE_PROJECT_ID: 977
    ALLURE_RESULTS: reports/allure-results
  before_script:
    - curl -fsSL "https://nexus.vkteam.ru/repository/raw-github-remote/allure-framework/allurectl/releases/download/2.18.0/allurectl_linux_amd64" -o allurectl
